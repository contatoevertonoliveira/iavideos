<body>
<div id="app" class="app"></div>

<script>
// ============================================================
// COMPLETE SPA APPLICATION - NeuralCineFlow
// ============================================================
const API_BASE = 'http://127.0.0.1:8000/api/v1';
const APP_VERSION = '1.0.0';

// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  token: localStorage.getItem('ncf_token'),
  refresh: localStorage.getItem('ncf_refresh'),
  user: JSON.parse(localStorage.getItem('ncf_user') || 'null'),
  page: 'home',
  projects: [],
  series: [],
  accounts: [],
  apiKeys: [],
  contentPlans: [],
  scheduledPosts: [],
  viralTemplates: [],
  chatHistory: JSON.parse(localStorage.getItem('ncf_chat') || '[]'),
  chatActive: null,
  workflow: null,  // { step, data } para fluxo guiado de criação
  autoPublish: localStorage.getItem('ncf_auto_publish') === 'true',
  settingsTab: 'api-keys',
  libraryFilter: 'todos',
  trendingFilter: 'todos',
  loading: {
    projects: false, series: false, accounts: false,
    apiKeys: false, contentPlans: false, scheduledPosts: false,
    viralTemplates: false
  }
};

// ─── Helpers ──────────────────────────────────────────────────────────────────
function $id(id) { return document.getElementById(id); }

function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  return fetch(`${API_BASE}${path}`, { ...opts, headers })
    .then(async r => {
      if (r.status === 401 && state.refresh) {
        // Try refresh
        const ref = await fetch(`${API_BASE}/auth/refresh?refresh=${state.refresh}`, { method: 'POST', headers });
        if (ref.ok) {
          const data = await ref.json();
          state.token = data.access;
          state.refresh = data.refresh || state.refresh;
          localStorage.setItem('ncf_token', state.token);
          localStorage.setItem('ncf_refresh', state.refresh);
          headers['Authorization'] = `Bearer ${state.token}`;
          return fetch(`${API_BASE}${path}`, { ...opts, headers });
        }
        logout();
        throw new Error('Sessão expirada');
      }
      const text = await r.text();
      try { return { ok: r.ok, status: r.status, data: JSON.parse(text) }; }
      catch { return { ok: r.ok, status: r.status, data: text }; }
    });
}

function qs(path, params = {}) {
  const q = new URLSearchParams();
  for (const [k, v] of Object.entries(params)) {
    if (v !== undefined && v !== null && v !== '') q.set(k, v);
  }
  const qs = q.toString();
  return qs ? `${path}?${qs}` : path;
}

function toast(message, type = 'info', title = '') {
  const container = $id('toast-container');
  if (!container) return;
  const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ'}</span>
    <div class="toast-content"><div class="toast-title">${title||type}</div>
    <div class="toast-desc">${message}</div></div>
    <button class="toast-close" onclick="this.parentElement.remove()">✕</button>`;
  container.appendChild(t);
  setTimeout(() => { if (t.parentElement) t.remove(); }, 5000);
}

function showModal(id) { const m = $id(id); if (m) m.classList.add('active'); }
function hideModal(id) { const m = $id(id); if (m) m.classList.remove('active'); }
function closeAllModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }

function providerIcon(p) {
  const icons = { openai:'🤖', google:'🌟', gemini:'🌟', piapi:'🧠', elevenlabs:'🗣️', anthropic:'🔮', replicate:'⚡', stability:'🎨' };
  return icons[p.toLowerCase()] || '🔑';
}
function providerName(p) {
  const names = { openai:'OpenAI', google:'Google Gemini', gemini:'Google Gemini', piapi:'PiAPI', elevenlabs:'ElevenLabs', anthropic:'Anthropic', replicate:'Replicate', stability:'Stability AI' };
  return names[p.toLowerCase()] || p;
}

function formatDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function formatDateTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function formatNumber(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n.toLocaleString('pt-BR');
}

function statusBadge(status) {
  const map = {
    draft: '<span class="badge badge-draft">Rascunho</span>',
    processing: '<span class="badge badge-processing">Processando</span>',
    completed: '<span class="badge badge-success">Pronto</span>',
    published: '<span class="badge badge-success">Publicado</span>',
    failed: '<span class="badge badge-error">Falhou</span>',
    scheduled: '<span class="badge badge-warning">Agendado</span>',
    approved: '<span class="badge badge-info">Aprovado</span>',
    publishing: '<span class="badge badge-processing">Publicando</span>',
    active: '<span class="badge badge-success">Ativo</span>',
    inactive: '<span class="badge badge-draft">Inativo</span>',
    awaiting_approval: '<span class="badge badge-warning">⏳ Aguardando Aprovação</span>',
  };
  return map[status] || `<span class="badge badge-draft">${status}</span>`;
}

function platformBadge(platform) {
  const map = { youtube: 'YouTube', tiktok: 'TikTok', instagram: 'Instagram', facebook: 'Facebook', twitter: 'Twitter/X' };
  return map[platform] || platform;
}

function platformColor(platform) {
  const map = { youtube: '#FF0000', tiktok: '#fff', instagram: '#E4405F', facebook: '#1877F2', twitter: '#1DA1F2' };
  return map[platform] || '#9CA3AF';
}

function platformBg(platform) {
  const map = { youtube: 'rgba(255,0,0,.12)', tiktok: 'rgba(0,0,0,.2)', instagram: 'rgba(228,64,95,.12)', facebook: 'rgba(24,119,242,.12)', twitter: 'rgba(29,161,242,.12)' };
  return map[platform] || 'rgba(156,163,175,.12)';
}

const DAY_NAMES = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
const DAY_NAMES_SHORT = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];

function logout() {
  state.token = null;
  state.refresh = null;
  state.user = null;
  localStorage.removeItem('ncf_token');
  localStorage.removeItem('ncf_refresh');
  localStorage.removeItem('ncf_user');
  render();
}

// ─── Auth ─────────────────────────────────────────────────────────────────────
async function handleLogin(e) {
  e.preventDefault();
  const email = $id('login-email').value.trim();
  const password = $id('login-password').value.trim();
  const errorEl = $id('login-error');
  if (!email || !password) {
    errorEl.textContent = 'Preencha email e senha.';
    errorEl.style.display = 'block';
    return;
  }
  errorEl.style.display = 'none';
  $id('login-btn').disabled = true;
  $id('login-btn').textContent = 'Entrando...';
  try {
    const r = await fetch(`${API_BASE}/auth/login?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`, { method: 'POST' });
    const data = await r.json();
    if (!r.ok) { throw new Error(data.detail || 'Erro ao autenticar'); }
    state.token = data.access;
    state.refresh = data.refresh;
    state.user = data.user;
    localStorage.setItem('ncf_token', data.access);
    localStorage.setItem('ncf_refresh', data.refresh);
    localStorage.setItem('ncf_user', JSON.stringify(data.user));
    render();
    // Auto-validate default API + start health check
    setTimeout(() => { autoValidateApi(); startApiHealthCheck(); }, 500);
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.style.display = 'block';
  }
  $id('login-btn').disabled = false;
  $id('login-btn').textContent = 'Entrar';
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function navigate(page) {
  state.page = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = $id(`page-${page}`);
  if (el) el.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const nav = document.querySelector(`.nav-item[data-page="${page}"]`);
  if (nav) nav.classList.add('active');
  // Update header title
  const titles = {
    home: 'Dashboard', agent: 'AI Agent', library: 'Biblioteca',
    series: 'Séries', stats: 'Estatísticas', aiimage: 'AI Image Generator',
    aivideo: 'AI Video Generator', characters: 'Personagens IA', trending: 'Trending',
    settings: 'Configurações'
  };
  const ht = document.querySelector('.header-title');
  if (ht) ht.textContent = titles[page] || 'NeuralCineFlow';
  // Load data
  loadPageData(page);
  // Close sidebar on mobile
  document.querySelector('.sidebar')?.classList.remove('open');
  document.querySelector('.sidebar-overlay')?.classList.remove('active');
}

function loadPageData(page) {
  switch (page) {
    case 'home': loadDashboard(); break;
    case 'agent': loadAgentPageData(); break;
    case 'library': loadProjects(); break;
    case 'series': loadSeries(); break;
    case 'stats': renderStatsPage(); break;
    case 'aiimage': renderAiImagePage(); break;
    case 'aivideo': renderAiVideoPage(); break;
    case 'characters': renderCharactersPage(); break;
    case 'trending': loadTemplates(); break;
    case 'settings': loadSettingsData(); break;
  }
}

// ─── AI AGENT ─────────────────────────────────────────────────────────────────
function renderChatMessage(m) {
  if (m.role === 'user') return `<div class="chat-msg user"><div class="msg-bubble user-bubble">${escapeHtml(m.text)}</div></div>`;
  // Bot messages: format with markdown-like rules
  const formatted = m.text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')  // **bold**
    .replace(/\*(.+?)\*/g, '<em>$1</em>')                // *italic*
    .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>') // code blocks
    .replace(/`(.+?)`/g, '<code>$1</code>')              // inline code
    .replace(/^### (.+)$/gm, '<h4>$1</h4>')              // ### heading
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')               // ## heading
    .replace(/^# (.+)$/gm, '<h2>$1</h2>')                // # heading
    .replace(/^- (.+)$/gm, '<li>$1</li>')                // - list items
    .replace(/(<li>.+<\/li>\n?)+/g, '<ul>$&</ul>')       // wrap lists
    .replace(/\n\n/g, '</p><p>')                          // paragraph break
    .replace(/\n/g, '<br>');                              // line break
  return `<div class="chat-msg bot"><div class="msg-bubble bot-bubble">${formatted}</div></div>`;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function detectTaskType(text) {
  const lower = text.toLowerCase();
  if (lower.includes('roteiro') || lower.includes('script') || lower.includes('cenas') || lower.includes('narrativa') || lower.includes('história para') || (lower.includes('crie') && (lower.includes('vídeo') || lower.includes('video')))) return 'script';
  if (lower.includes('analise') || lower.includes('analisar') || lower.includes('análise') || lower.includes('viral') || lower.includes('tendência') || lower.includes('trend') || lower.includes('cópia') || lower.includes('copiar')) return 'analysis';
  if (lower.includes('plano') || lower.includes('planejar') || lower.includes('planejamento') || lower.includes('cronograma') || lower.includes('semanal') || lower.includes('agenda')) return 'planning';
  if (lower.includes('sugestão') || lower.includes('sugestao') || lower.includes('ideia') || lower.includes('inspiração') || lower.includes('criativo') || lower.includes('o que criar')) return 'creative';
  if (lower.includes('áudio') || lower.includes('audio') || lower.includes('voz') || lower.includes('narração') || lower.includes('narracao') || lower.includes('tts')) return 'audio';
  if (lower.includes('raciocínio') || lower.includes('raciocinar') || lower.includes('complexo') || lower.includes('profundo') || lower.includes('pesquisa')) return 'reasoning';
  return 'chat';
}

async function sendMessage() {
  try {
    const input = document.getElementById('chat-input-field');
    if (!input || !input.value.trim()) return;
    const text = input.value.trim();
    input.value = '';
    const chat = state.chatHistory.find(c => c.id === state.chatActive);
    if (!chat) return;

    // Debug: ver estado
    console.log('[sendMessage] text:', text);
    console.log('[sendMessage] apiKeys:', JSON.stringify(state.apiKeys));
    
    // Add user message to history
    chat.messages.push({ role: 'user', text });
    saveChat();
    renderAgentPage();
    
    // Add typing indicator
    const msgs = document.getElementById('chat-messages');
    if (msgs) {
      const typing = document.createElement('div');
      typing.className = 'chat-msg bot';
      typing.id = 'typing-indicator';
      typing.innerHTML = '<div class="typing-indicator"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
      msgs.appendChild(typing);
      msgs.scrollTop = msgs.scrollHeight;
    }

    // Check if we have a configured AI
    const hasGoogleKey = state.apiKeys && Array.isArray(state.apiKeys) && state.apiKeys.some(k => (k.provider === 'google' || k.provider === 'gemini') && k.is_active);
    console.log('[sendMessage] hasGoogleKey:', hasGoogleKey);

    // Detecta se é workflow de criação de vídeo
    const lowerText = text.toLowerCase();
    const isCreateIntent = !!(state.workflow || (
      hasGoogleKey && (
        lowerText.includes('criar') || lowerText.includes('crie') || lowerText.includes('roteiro') ||
        lowerText.includes('vídeo') || lowerText.includes('quero criar') || lowerText.includes('fazer um')
      )
    ));
    console.log('[sendMessage] isCreateIntent:', isCreateIntent);

    if (hasGoogleKey && isCreateIntent) {
      try {
        const workflowData = state.workflow?.data || {};
        // step é sempre "configure" (o current_index do backend controla o progresso)
        const workflowStep = "configure";
        
        // Inclui a resposta do usuário
        workflowData.user_input = text;

        const r = await api('/google/workflow', {
          method: 'POST',
          body: JSON.stringify({
            step: workflowStep,
            data: workflowData,
            context: {
              projects_count: state.projects?.length || 0,
              accounts_count: state.accounts?.length || 0,
            },
          }),
        });
        if (r.ok && r.data && r.data.response) {
          const typingEl = document.getElementById('typing-indicator');
          if (typingEl) typingEl.remove();
          const response = r.data.response;
          const nextStep = r.data.next_step || "configure";
          const responseData = r.data.data || workflowData;

          // Atualiza workflow state com dados acumulados do backend
          state.workflow = { step: nextStep, data: responseData };
          
          // Se gerou roteiro completo, cria projeto e encerra workflow
          if (nextStep === 'generate_complete') {
            const progress = r.data.progress || {};
            const projectTitle = responseData.theme || 'Vídeo criado pelo chat';
            const status = state.autoPublish ? 'approved' : 'awaiting_approval';
            const allFields = Object.entries(progress.fields || {}).filter(([_,v]) => v).map(([k]) => k).join(', ');
            
            api('/projects', {
              method: 'POST',
              body: JSON.stringify({
                title: projectTitle,
                prompt: text,
                script_text: response.substring(0, 5000),
                style: responseData.style || 'story',
                niche: responseData.niche || '',
                status: status,
              }),
            }).then(r2 => {
              if (r2.ok) {
                toast(`✅ Projeto "${projectTitle}" criado! Vá em Biblioteca para ver.`, 'success');
                checkSocialAccounts();
              }
            });
            state.workflow = null; // reseta workflow
          }

          chat.messages.push({ role: 'bot', text: response });
          if (chat.title === 'Novo Chat') chat.title = text.length > 30 ? text.substr(0, 30)+'...' : text;
          saveChat();
          renderAgentPage();
          return;
        }
      } catch (e) {
        console.warn('[sendMessage] workflow error:', e);
        // Fallback para o agent padrão
      }
    }

    // Fallback: agent padrão
    if (hasGoogleKey) {
      try {
        const ctx = {
          projects_count: state.projects?.length || 0,
          accounts_count: state.accounts?.length || 0,
          active_series: state.series?.filter(s=>s.is_active)?.length || 0,
          content_plans: (state.contentPlans?.length || 0) > 0,
        };
        console.log('[sendMessage] calling /google/agent...');
        const r = await api('/google/agent', {
          method: 'POST',
          body: JSON.stringify({ command: text, context: ctx }),
        });
        if (r.ok && r.data && r.data.response) {
          const typingEl = document.getElementById('typing-indicator');
          if (typingEl) typingEl.remove();
          const response = r.data.response;
          const modelInfo = r.data.model_used ? `\n\n┈ Modelo usado: ${r.data.model_used} ┈` : '';
          const actions = r.data.actions || [];
          chat.messages.push({ role: 'bot', text: response + modelInfo });
          if (chat.title === 'Novo Chat') chat.title = text.length > 30 ? text.substr(0, 30)+'...' : text;
          saveChat();
          renderAgentPage();
          for (const a of actions) {
            if (a.action === 'create_project') toast(`✅ Projeto "${a.title}" criado!`, 'success');
          }
          return;
        } else {
          console.warn('[sendMessage] agent returned not ok:', r);
        }
      } catch (e) {
        console.warn('[sendMessage] Google error:', e);
      }
    }

    // Fallback: simulated response
    console.log('[sendMessage] using simulated fallback');
    await new Promise(r => setTimeout(r, 800 + Math.random() * 700));
    const typingEl2 = document.getElementById('typing-indicator');
    if (typingEl2) typingEl2.remove();
    const lower = text.toLowerCase();
    let response = '';
    let action = '';
    const cleanText = text.replace(/crie uma série sobre|série sobre|sobre/gi,'').trim();
    if (lower.includes('série') || lower.includes('mitologia') || lower.includes('crie uma série')) {
      response = getRandomResponse('series').replace('{topic}', cleanText || 'Mitologia Grega');
      action = 'create_series';
    } else if (lower.includes('agende') || lower.includes('agendar') || lower.includes('agenda')) {
      response = getRandomResponse('schedule');
      action = 'schedule';
    } else if (lower.includes('plano') || lower.includes('planner') || lower.includes('planejamento')) {
      response = getRandomResponse('plan');
      action = 'create_plan';
    } else if (lower.includes('viral') || lower.includes('analise') || lower.includes('copiar') || lower.includes('tendência') || lower.includes('trend')) {
      response = getRandomResponse('viral');
      action = 'copy_viral';
    } else if (lower.includes('oi') || lower.includes('olá') || lower.includes('bom dia') || lower.includes('boa tarde') || lower.includes('boa noite')) {
      response = getRandomResponse('greeting');
    } else {
      response = getRandomResponse('default').replace('{topic}', text);
    }
    console.log('[sendMessage] response:', response.substring(0, 50));
    chat.messages.push({ role: 'bot', text: response });
    if (chat.title === 'Novo Chat') {
      chat.title = text.length > 30 ? text.substr(0, 30)+'...' : text;
    }
    saveChat();
    renderAgentPage();
    if (action === 'create_series' && state.user) {
      createSeriesFromChat(text).catch(()=>{});
    }
  } catch (e) {
    console.error('[sendMessage] FATAL ERROR:', e);
    try {
      const chat = state.chatHistory.find(c => c.id === state.chatActive);
      if (chat) {
        const typingEl = document.getElementById('typing-indicator');
        if (typingEl) typingEl.remove();
        chat.messages.push({ role: 'bot', text: '⚠️ Ocorreu um erro ao processar sua mensagem. Tente novamente.' });
        saveChat();
        renderAgentPage();
      }
    } catch (e2) {
      console.error('[sendMessage] error handler also failed:', e2);
    }
  }
}

  if (!el) return;
  state.loading.projects = true;

function renderLibrary() {

            <option value="natan" ${w.data.voice==='natan'?'selected':''}>Natan (masculino)</option>
          </select>
        </div>`;
      break;
    case 3:
      const durLabel = {15:'15s (Super Curto)',30:'30s (Curto)',60:'60s (Padrão)',180:'3min (Médio)',300:'5min (Longo)',600:'10min (Muito Longo)'}[w.data.duration] || '60s (Padrão)';
      const genFirst = w.data.genFirst ? '✅ Sim, criar 1º episódio' : '❌ Não, apenas configurar';
      bodyHTML = `
        <div class="review-card" style="background:var(--surface);border-radius:var(--radius-sm);padding:16px">
          <div class="review-item" style="font-size:13px;line-height:2"><strong>📝 Nome:</strong> ${w.data.name}</div>

          <div class="review-item" style="font-size:13px;line-height:2"><strong>📅 Frequência:</strong> ${w.data.freq === 'daily' ? 'Diária' : w.data.freq === 'weekly' ? 'Semanal' : 'Personalizada'}</div>

          <div class="review-item" style="font-size:13px;line-height:2"><strong>🔊 Voz:</strong> ${w.data.voice}</div>
          <div class="review-item" style="font-size:13px;line-height:2"><strong>▶ Gerar 1º episódio:</strong> ${genFirst}</div>
        </div>
        <p style="font-size:12px;color:var(--text3);margin-top:12px">Ao confirmar, a série será criada${w.data.genFirst ? ' e o primeiro episódio será gerado na biblioteca' : ''}. Depois você pode gerenciar (Play/Pausar/Parar) na página Séries.</p>`;
      break;
  }

  ma.innerHTML = `
  <div class="modal-overlay active" onclick="_seriesWorkflow={step:0,data:{}};closeAllModals()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3>📺 ${steps[w.step]?.icon || ''} ${steps[w.step]?.title || 'Nova Série'}</h3>
        <button class="modal-close" onclick="_seriesWorkflow={step:0,data:{}};closeAllModals()">✕</button>
      </div>
      <div class="modal-body">
        <div style="display:flex;gap:4px;margin-bottom:16px">
          ${steps.map((st, i) => `<div style="flex:1;height:4px;border-radius:2px;background:${i <= w.step ? 'var(--accent1)' : 'var(--surface3)'};transition:background .3s"></div>`).join('')}
        </div>
        ${bodyHTML}
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="seriesWorkflowPrev()" ${w.step === 0 ? 'disabled' : ''}>◀ Voltar</button>
        <button class="btn btn-primary" onclick="seriesWorkflowNext()">${w.step === steps.length - 1 ? '✅ Criar Série' : 'Próximo ▶'}</button>
      </div>
    </div>
  </div>`;
  setTimeout(() => { const f = ma.querySelector('input:not([type=checkbox])'); if (f) f.focus(); }, 100);
}

function seriesWorkflowPrev() {
  _seriesWorkflow.step = Math.max(0, _seriesWorkflow.step - 1);
  renderSeriesWorkflowStep();
}

function seriesWorkflowNext() {
  const w = _seriesWorkflow;
  switch (w.step) {
    case 0:
      w.data.name = document.getElementById('ws-name')?.value?.trim();
      w.data.topic = document.getElementById('ws-topic')?.value?.trim();
      w.data.niche = document.getElementById('ws-niche')?.value || '';
      if (!w.data.name || !w.data.topic) { toast('Preencha nome e tema', 'warning'); return; }
      break;
    case 1:
      w.data.freq = document.getElementById('ws-freq')?.value || 'daily';
      w.data.time = document.getElementById('ws-time')?.value || '08:00';
      w.data.genFirst = document.getElementById('ws-gen-first')?.checked || false;
      break;
    case 2:
      w.data.style = document.getElementById('ws-style')?.value || 'story';
      w.data.duration = parseInt(document.getElementById('ws-duration')?.value) || 60;
      w.data.voice = document.getElementById('ws-voice')?.value || 'adam';
      break;
    case 3:
      // Create series
      submitSeriesWorkflow();
      return;
  }
  w.step++;
  renderSeriesWorkflowStep();
}

async function submitSeriesWorkflow() {
  const w = _seriesWorkflow;
  try {
    const res = await api('/series', {
      method: 'POST',
      body: JSON.stringify({
        name: w.data.name,
        topic: w.data.topic,
        niche: w.data.niche,
        style: w.data.style,
        voice: w.data.voice,
        frequency: w.data.freq,
        publish_time: w.data.time,
        duration_secs: w.data.duration || 60,
      }),
    });
    if (res.ok) {
      _seriesWorkflow = { step: 0, data: {} };
      closeAllModals();
      toast('✅ Série criada com sucesso!', 'success');

      // Se marcou gerar primeiro episódio, gera agora
      if (w.data.genFirst && res.data?.id) {
        toast('🎬 Gerando primeiro episódio...', 'info');
        const gen = await api(`/series/${res.data.id}/generate`, { method: 'POST' });
        if (gen.ok) toast('🎬 Primeiro episódio gerado na biblioteca!', 'success');
      }

      if (state.page === 'series') loadSeries();
      else { state.series = [...state.series, res.data]; if ($id('page-home')) loadDashboard(); }
    } else toast(res.data?.detail || 'Erro ao criar série', 'error');
  } catch (e) { toast('Erro de conexão', 'error'); }
}

async function submitPublish(projectId) {
  const accounts = document.querySelectorAll('.pub-account:checked');
  if (accounts.length === 0) { toast('Selecione pelo menos uma conta', 'warning'); return; }
  const title = document.getElementById('pub-title')?.value || 'Vídeo';
  const desc = document.getElementById('pub-desc')?.value || '';
  const needsApproval = document.getElementById('pub-needs-approval')?.checked ?? true;

  let ok = 0, err = 0;
  for (const acc of accounts) {
    try {
      const r = await api('/scheduled-posts', {
        method: 'POST',
        body: JSON.stringify({
          project_id: projectId,
          social_account_id: parseInt(acc.value),
          platform: acc.dataset.platform,
          title, description: desc,
          needs_approval: needsApproval,
        }),
      });
      if (r.ok) ok++; else err++;
    } catch(e) { err++; }
  }

  if (needsApproval) {
    // Update project status to waiting approval
    await api(`/projects/${projectId}`, { method: 'PUT', body: JSON.stringify({ status: 'awaiting_approval' }) });
  } else {
    // Auto-publish
    await api(`/projects/${projectId}`, { method: 'PUT', body: JSON.stringify({ status: 'published' }) });
  }

  closeAllModals();
  toast(`${ok} publicação(ões) criada(s)${needsApproval ? ' — aguardando aprovação' : ' — publicada(s)!'}`, ok > 0 ? 'success' : 'error');
  loadDashboard();
  loadProjects();
}

async function submitSchedule(projectId) {
  const accounts = document.querySelectorAll('.pub-account:checked');
  if (accounts.length === 0) { toast('Selecione pelo menos uma conta', 'warning'); return; }
  const title = document.getElementById('pub-title')?.value || 'Vídeo';
  const desc = document.getElementById('pub-desc')?.value || '';
  const needsApproval = document.getElementById('pub-needs-approval')?.checked ?? true;
  const scheduleVal = document.getElementById('pub-datetime')?.value;
  const scheduledAt = scheduleVal ? new Date(scheduleVal).toISOString() : null;

  if (!scheduledAt) { toast('Selecione uma data para agendar', 'warning'); return; }

  let ok = 0, err = 0;
  for (const acc of accounts) {
    try {
      const r = await api('/scheduled-posts', {
        method: 'POST',
        body: JSON.stringify({
          project_id: projectId,
          social_account_id: parseInt(acc.value),
          platform: acc.dataset.platform,
          title, description: desc,
          scheduled_at: scheduledAt,
          needs_approval: true, // sempre precisa aprovação quando agendado
        }),
      });
      if (r.ok) ok++; else err++;
    } catch(e) { err++; }
  }

  await api(`/projects/${projectId}`, { method: 'PUT', body: JSON.stringify({ status: 'scheduled' }) });
  closeAllModals();
  toast(`${ok} publicação(ões) agendada(s) para ${new Date(scheduledAt).toLocaleString('pt-BR')} — aguardando aprovação`, ok > 0 ? 'success' : 'error');
  loadDashboard();
  loadProjects();
}

    if (stepEl) {
      stepEl.className = 'gen-step done';
      const next = stepEl.nextElementSibling;
      if (next) { next.className = 'gen-step active'; next.innerHTML = '⏳ ' + label; }
    }
  };

  try {
    const res = await api(`/series/${id}/generate`, { method: 'POST' });
    if (!res.ok) { closeAllModals(); toast('Erro ao gerar episódio', 'error'); return; }
    const projectId = res.data?.project_id;
    window._lastGenProjectId = projectId;
    const projectTitle = res.data?.project_title || 'Episódio';

    // Animar progresso
    for (let i = 0; i < steps.length; i++) {
      await new Promise(r => setTimeout(r, 800 + Math.random() * 600));
      const el = document.querySelector(`[data-step="${i+2}"]`);
      advance(15 + (i+1) * 14, stepLabels[i], el);
    }

    // Completa
    await new Promise(r => setTimeout(r, 600));
    advance(100, '✅ Vídeo pronto!', null);
    document.getElementById('gen-body').innerHTML = `
      <div style="text-align:center;padding:20px 0">
        <div style="font-size:60px;margin-bottom:16px">🎬</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:8px">✅ ${projectTitle}</div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:16px">Episódio gerado e salvo na Biblioteca!</div>
        <div style="background:#000;border-radius:var(--radius-sm);aspect-ratio:9/16;max-height:280px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin:0 auto;max-width:200px;cursor:pointer" onclick="showProjectDetail(${projectId})">

            <div style="font-size:40px;margin-bottom:8px">▶️</div>
            <div style="font-size:11px">Clique para assistir</div>
          </div>
        </div>
      </div>`;
    document.getElementById('gen-footer').style.display = 'flex';
    // Atualiza status do projeto para 'completed'
    await api(`/projects/${projectId}`, { method: 'PUT', body: JSON.stringify({ status: 'completed' }) });
    loadSeries();
    loadProjects();
    toast('🎬 Episódio gerado com sucesso!', 'success');

async function autoValidateApi() {
  const indicator = document.getElementById('api-status-indicator');
  if (!indicator) return;
  try {
    const r = await api('/settings/api-keys/default');
    if (!r.ok || !r.data?.has_default) {
      setApiIndicator(indicator, 'warning', '⚠️ Sem API configurada');
      return;
    }
    const provider = r.data.provider;

    // Tenta validar a conexão
    const result = await testApiConnection(provider);
    if (result.ok) {
      setApiIndicator(indicator, 'success', `🟢 ${providerName(provider)} conectada`, `API ${provider} OK: ${result.models || ''}`);
      if (state._apiLastStatus !== 'connected') {
        toast(`✅ API ${providerName(provider)} conectada e funcionando!`, 'success');
      }
      state._apiLastStatus = 'connected';
      state._apiFailCount = 0;
    } else {
      state._apiFailCount = (state._apiFailCount || 0) + 1;
      const msg = `🔴 ${providerName(provider)}: ${result.error}`;
      setApiIndicator(indicator, 'error', msg);
      indicator.title = `Falha #${state._apiFailCount}. A próxima tentativa em 30s.`;
      if (state._apiLastStatus === 'connected' || !state._apiLastStatus) {
        toast(`❌ API ${providerName(provider)}: ${result.error}`, 'error');
      }
      state._apiLastStatus = 'disconnected';
    }
  } catch (e) {
    setApiIndicator(indicator, 'warning', '⚠️ Sem API');
  }
}

async function testApiConnection(provider) {
  // Tenta validar real com retry embutido
  for (let attempt = 1; attempt <= 2; attempt++) {
    try {
      if (provider === 'google' || provider === 'gemini') {
        const v = await api('/google/validate');
        if (v.ok && v.data?.valid) {
          return { ok: true, models: v.data.total_available + ' modelos disponíveis' };
        }
        // Google retornou resposta mas não validou
        return { ok: false, error: 'Chave inválida ou sem acesso' };
      } else {
        // Para outros provedores, tenta um get básico
        return { ok: true, error: null };
      }
    } catch (e) {
      if (attempt === 1) {
        // Espera 2s e tenta de novo
        await new Promise(r => setTimeout(r, 2000));
        continue;
      }
      const msg = e.data?.detail || e.message || 'Falha na conexão';
      return { ok: false, error: msg.length > 60 ? msg.substring(0, 60) + '...' : msg };
    }
  }
  return { ok: false, error: 'Tentativas esgotadas' };
}

function setApiIndicator(indicator, type, text, titleText) {
  const styles = {
    success: { border: '#06D6A0', color: '#06D6A0' },
    error: { border: '#EF4444', color: '#EF4444' },
    warning: { border: '#F59E0B', color: '#F59E0B' },
    checking: { border: '#60A5FA', color: '#60A5FA' },
  };
  const s = styles[type] || styles.warning;
  indicator.innerHTML = text;
  indicator.style.borderColor = s.border;
  indicator.style.color = s.color;
  if (titleText) indicator.title = titleText;
}

// Health check periódico (a cada 30s verifica conexão)
let _healthInterval = null;
function startApiHealthCheck() {
  stopApiHealthCheck();
  _healthInterval = setInterval(() => {
    const indicator = document.getElementById('api-status-indicator');
    if (!indicator) return;
    // Só revalida se estiver com erro ou se passou muito tempo
    const isRed = indicator.style.borderColor === 'rgb(239, 68, 68)';
    const isOrange = indicator.style.borderColor === 'rgb(245, 158, 11)';
    if (isRed || isOrange) {
      autoValidateApi();
    }
  }, 30000); // 30 segundos
}
function stopApiHealthCheck() {
  if (_healthInterval) { clearInterval(_healthInterval); _healthInterval = null; }
}

async function testApiKey(id, provider) {
  const btn = document.getElementById(`key-test-${id}`);
  const led = document.getElementById(`key-status-${id}`);
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = '⏳';

  // Validação real para Google/Gemini, simulada para outros provedores
  if (provider === 'google' || provider === 'gemini') {
    try {
      const r = await api('/google/validate');
      const ok = r.ok && r.data?.valid === true;
      if (led) {
        led.className = `key-led ${ok ? 'led-valid' : 'led-invalid'}`;
        led.title = ok ? 'Conexão OK' : 'Falha na conexão';
      }
      btn.disabled = false;
      btn.textContent = ok ? '✅' : '❌';
      if (ok) {
        const models = r.data?.models?.join(', ') || 'modelos disponíveis';
        toast(`Google Gemini conectado! ${r.data.total_available} ${models}`, 'success');
      } else {
        toast('Falha na validação da chave Google', 'error');
      }
      setTimeout(() => { if (btn) btn.textContent = 'Testar'; }, 3000);
      return;
    } catch (e) {
      if (led) { led.className = 'key-led led-invalid'; led.title = 'Falha na conexão'; }
      btn.disabled = false;
      btn.textContent = '❌';
      toast('Chave Google inválida ou sem permissão', 'error');
      setTimeout(() => { if (btn) btn.textContent = 'Testar'; }, 3000);
      return;
    }
  }

  // Simula validação para outros provedores
  await new Promise(r => setTimeout(r, 1500));
  const ok = Math.random() > 0.2;
  if (led) {
    led.className = `key-led ${ok ? 'led-valid' : 'led-invalid'}`;
    led.title = ok ? 'Conexão OK' : 'Falha na conexão';
  }
  btn.disabled = false;
  btn.textContent = ok ? '✅' : '❌';
  setTimeout(() => { if (btn) btn.textContent = 'Testar'; }, 2000);
  toast(`Chave ${provider}: ${ok ? 'conexão estabelecida!' : 'falha na validação'}`, ok ? 'success' : 'error');
}

function togglePubPlatform(el) {
  el.classList.toggle('selected');
  updatePubAccounts();
}

function updatePubAccounts() {
  const selected = document.querySelectorAll('#pub-platforms .platform-opt.selected');
  const info = $id('pub-accounts-info');
  if (info) {
    if (selected.length === 0) info.textContent = 'Selecione ao menos uma plataforma';
    else info.textContent = `${selected.length} plataforma(s) selecionada(s)`;
  }
}

function togglePubSchedule() {
  const later = document.querySelector('input[name="pub-schedule"]:checked')?.value === 'later';
  $id('pub-datetime-group')?.classList.toggle('hidden', !later);
}

async function confirmPublish(projectId) {
  const selected = document.querySelectorAll('#pub-platforms .platform-opt.selected');
  if (selected.length === 0) { toast('Selecione ao menos uma plataforma', 'warning'); return; }
  const needsApproval = $id('pub-needs-approval')?.checked ?? true;
  const scheduleLater = document.querySelector('input[name="pub-schedule"]:checked')?.value === 'later';
  let scheduledAt = null;
  if (scheduleLater) {
    scheduledAt = $id('pub-datetime')?.value;
    if (!scheduledAt) { toast('Selecione data e hora', 'warning'); return; }
    scheduledAt = new Date(scheduledAt).toISOString();
  } else {
    scheduledAt = new Date().toISOString();
  }
  let success = 0;
  for (const opt of selected) {
    const platform = opt.dataset.platform;
    const account = state.accounts.find(a => a.provider === platform);
    if (!account) { toast(`Conecte uma conta ${platformBadge(platform)} primeiro`, 'warning'); continue; }
    try {
      const r = await api('/scheduled-posts', {
        method: 'POST',
        body: JSON.stringify({
          project_id: projectId,
          social_account_id: account.id,
          platform,
          title: document.querySelector('.modal-header h3')?.textContent?.replace('📤 Publicar: ','') || 'Vídeo',
          scheduled_at: scheduleLater ? scheduledAt : null,
          needs_approval: needsApproval
        })
      });
      if (r.ok) success++;
    } catch(e) {}
  }
  if (success > 0) {
    toast(`${success} publicação(ões) criada(s)!`, 'success', 'Publicação Agendada');
    closeAllModals();
    loadScheduledPosts();
  } else {
    toast('Erro ao publicar', 'error');
  }
}

function autoFillBaseUrl() {
  const provider = document.getElementById('ak-provider')?.value;
  const baseInput = document.getElementById('ak-base');
  if (!baseInput) return;
  const urls = {
    google: 'https://generativelanguage.googleapis.com/v1beta',
    openai: 'https://api.openai.com/v1',
    anthropic: 'https://api.anthropic.com',
    replicate: 'https://api.replicate.com',
    elevenlabs: 'https://api.elevenlabs.io',
    piapi: 'https://api.piapi.ai',
    stability: 'https://api.stability.ai',
  };
  if (urls[provider]) {
    baseInput.value = urls[provider];
    baseInput.style.borderColor = 'var(--success)';
  } else {
    baseInput.value = '';
    baseInput.style.borderColor = '';
  }
}

async function connectAccount(provider) {
  try {

    if (r.ok) {
      // Mock: create a social account entry
      await api('/accounts/google/exchange?code=mock_code', { method: 'POST' });
      toast(`Conta ${platformBadge(provider)} conectada!`, 'success');
      hideModal('modal-connect-account');
      loadAccounts();
      renderAccountsSettings();
    }
  } catch(e) { toast('Erro ao conectar', 'error'); }
}

function submitContentPlan() {
  const title = $id('cp-title')?.value?.trim();
  if (!title) { toast('Digite um título', 'warning'); return; }
  const keywords = $id('cp-keywords')?.value?.split(',').map(k => k.trim()).filter(Boolean) || [];

async function submitTemplate() {
  const title = $id('ct-title')?.value?.trim();
  if (!title) { toast('Digite um título', 'warning'); return; }
  try {
    const r = await api('/viral-templates', {
      method: 'POST',

async function generateImage() {
  const prompt = $id('aiimg-prompt')?.value?.trim();
  if (!prompt) { toast('Digite um prompt para gerar a imagem', 'warning'); return; }
  const gallery = $id('aiimg-gallery');
  if (!gallery) return;
  // Show generating state
  gallery.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:30px">
    <div class="loading-spinner" style="width:40px;height:40px;margin:0 auto 12px"></div>
    <p style="color:var(--text2)">Gerando imagem... "${prompt}"</p>
  </div>`;
  // Simulate generation
  const style = $id('aiimg-style')?.value || 'realistic';
  const aspect = $id('aiimg-aspect')?.value || '16:9';
  const count = parseInt($id('aiimg-count')?.value || '1');
  await new Promise(r => setTimeout(r, 2000));
  const images = [];
  for (let i = 0; i < count; i++) {
    images.push({
      url: `https://picsum.photos/seed/img${Date.now()}_${i}/512/288`,
      prompt, style, aspect,
      id: Date.now() + i
    });
  }
  gallery.innerHTML = images.map(img => `
    <div class="template-card">
      <img class="tc-thumb" src="${img.url}" alt="${prompt}" style="height:160px;cursor:pointer" onclick="window.open('${img.url}','_blank')" loading="lazy">
      <div class="tc-body">
        <div class="tc-title" style="font-size:11px">${prompt.length > 50 ? prompt.substr(0,50)+'...' : prompt}</div>
        <div class="tc-meta">
          <span>${style}</span><span>•</span><span>${aspect}</span>
        </div>
      </div>
    </div>`).join('');
  toast(`${count} imagem(ns) gerada(s)!`, 'success', 'Imagens Criadas');
}

async function generateVideo() {
  const prompt = $id('aivid-prompt')?.value?.trim();
  if (!prompt) { toast('Digite um prompt para o vídeo', 'warning'); return; }
  const duration = $id('aivid-duration')?.value || '30';
  const aspect = $id('aivid-aspect')?.value || '9:16';
  const voice = $id('aivid-voice')?.value || 'adam';
  const music = $id('aivid-music')?.value || 'none';
  const script = $id('aivid-script')?.value || '';
  const gallery = $id('aivid-gallery');
  if (!gallery) return;
  gallery.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:30px">
    <div class="loading-spinner" style="width:40px;height:40px;margin:0 auto 12px"></div>
    <p style="color:var(--text2)">Gerando vídeo... Isso pode levar alguns minutos.</p>
    <div style="margin-top:12px;font-size:12px;color:var(--text3)">🎬 Renderizando • 🔊 Adicionando áudio • ✨ Aplicando efeitos</div>
  </div>`;
  await new Promise(r => setTimeout(r, 3000));
  // Create project
  try {
    await api('/projects', {
      method: 'POST',
      body: JSON.stringify({
        title: prompt.length > 50 ? prompt.substr(0,50)+'...' : prompt,
        prompt, script_text: script || null,
        voice, background_music: music !== 'none' ? music : null,
        style: parseInt(duration) <= 60 ? 'shorts' : 'longform',
        status: 'completed'
      })
    });
  } catch(e) {}
  gallery.innerHTML = `
    <div class="project-card" style="grid-column:1/-1">
      <div style="padding:20px;text-align:center">
        <div style="font-size:48px;margin-bottom:12px">🎬</div>
        <div style="font-weight:600;font-size:16px;margin-bottom:4px">Vídeo Gerado com Sucesso!</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:16px">"${prompt.length > 60 ? prompt.substr(0,60)+'...' : prompt}"</div>
        <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
          <span class="badge badge-success">Pronto</span>
          <span class="badge badge-info">${duration}s • ${aspect}</span>
          <span class="badge badge-info">Voz: ${voice}</span>
        </div>
        <div style="margin-top:16px;display:flex;gap:10px;justify-content:center">
          <button class="btn btn-primary btn-sm" onclick="showPublishModal(-1, '${prompt.replace(/'/g,"\\'")}')">📤 Publicar Agora</button>
          <button class="btn btn-secondary btn-sm" onclick="navigate('library')">📚 Ver na Biblioteca</button>
        </div>
      </div>
    </div>`;
  toast('Vídeo gerado com sucesso!', 'success', 'Vídeo Criado');
}

});

// ─── ACTIVITY FEED HELPER ─────────────────────────────────────────────────────
function getActivityFeed(projects = [], series = [], posts = []) {
  const activities = [];
  projects.forEach(p => activities.push({
    type: 'project',
    text: `Projeto "${p.title}" ${p.status === 'completed' ? 'finalizado' : p.status === 'published' ? 'publicado' : 'criado'}`,
    time: p.created_at, icon: '🎬', status: p.status
  }));
  series.forEach(s => activities.push({
    type: 'series',
    text: `Série "${s.name}" - ${s.episodes_published}/${s.episodes_total} episódios`,
    time: s.created_at, icon: '📺', status: s.is_active ? 'active' : 'inactive'
  }));
  posts.forEach(p => activities.push({
    type: 'post', text: `Publicação "${p.title}" ${p.status === 'published' ? 'publicada' : 'agendada'} em ${platformBadge(p.platform)}`,
    time: p.created_at, icon: '📤', status: p.status
  }));
  activities.sort((a, b) => {
    if (!a.time && !b.time) return 0;
    if (!a.time) return 1; if (!b.time) return -1;
    return new Date(b.time) - new Date(a.time);
  });
  return activities.slice(0, 8);
}

// ─── GENERATE RANDOM COLOR ────────────────────────────────────────────────────
function randomColor(seed) {
  const colors = ['#7C3AED','#00B4FF','#10B981','#F59E0B','#EF4444','#EC4899','#8B5CF6','#3B82F6','#14B8A6','#F97316'];
  let hash = 0;
  const str = String(seed || Math.random());
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  return colors[Math.abs(hash) % colors.length];
}

// ─── ACTIVITY FEED ON DASHBOARD ──────────────────────────────────────────────
function renderActivityFeed(activities) {
  if (!activities || activities.length === 0) {
    return '<div class="text-sm" style="padding:12px;text-align:center">Nenhuma atividade recente</div>';
  }
  return activities.map(a => `
    <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px">
      <span style="font-size:16px;flex-shrink:0">${a.icon}</span>
      <div style="flex:1;min-width:0">
        <div style="color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.text}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">${a.time ? formatDateTime(a.time) : 'Agora'}</div>
      </div>
      ${a.status ? statusBadge(a.status) : ''}
    </div>`).join('');
}
